<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Zignals — Admin (demo)</title>
    <link rel="stylesheet" href="./assets/styles.css" />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div class="layout">
      <aside id="sidebar-root" class="sidebar"></aside>
      <main class="main">
        <header class="topbar">
          <span class="badge-live demo" data-api-badge style="margin-right: 8px">Connecting…</span>
          <div data-auth-slot></div>
        </header>
        <section class="content">
          <h1 class="h1">Admin overview</h1>
          <p class="sub">Read-only slice of the same localStorage demo payloads your members generate — wire to real admin APIs later.</p>
          <div class="grid grid-4">
            <div class="interactive-card stat-chip" data-tilt>
              <div class="muted">Deposits</div>
              <div class="value" data-admin-stat="deposits">0</div>
            </div>
            <div class="interactive-card stat-chip" data-tilt>
              <div class="muted">Withdrawals</div>
              <div class="value" data-admin-stat="withdrawals">0</div>
            </div>
            <div class="interactive-card stat-chip" data-tilt>
              <div class="muted">Trades</div>
              <div class="value" data-admin-stat="trades">0</div>
            </div>
            <div class="interactive-card stat-chip" data-tilt>
              <div class="muted">Sessions</div>
              <div class="value" data-admin-stat="users">0</div>
            </div>
          </div>
          <div class="card">
            <strong>Recent demo activity</strong>
            <table class="history">
              <thead>
                <tr>
                  <th>When</th>
                  <th>Type</th>
                  <th>Detail</th>
                  <th>Amount</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody id="admin-activity"></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>
    <script src="./assets/app.js"></script>
    <script>
      DemoApp.initAdminPage();
    </script>
  </body>
</html>
