<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Zignals — Deposit</title>
    <link rel="stylesheet" href="./assets/styles.css" />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div class="layout">
      <aside id="sidebar-root" class="sidebar"></aside>
      <main class="main">
        <header class="topbar">
          <span class="badge-live demo" data-api-badge style="margin-right: 8px">Connecting…</span>
          <div data-auth-slot></div>
          <button type="button" class="icon-btn">🔔</button>
        </header>
        <section class="content">
          <h1 class="h1">Deposit</h1>
          <p class="sub">Submit proofs and currencies your backend expects — demo stores rows locally.</p>
          <div class="card interactive" data-tilt>
            <form id="deposit-form" class="grid grid-2">
              <div>
                <label>Currency</label>
                <select name="currency"><option value="USD">USD</option><option value="PHP">PHP</option></select>
              </div>
              <div>
                <label>Mode of payment</label>
                <select name="method"><option>SOL</option><option>BSC</option><option>TRX</option></select>
              </div>
              <div>
                <label>Amount (USD)</label>
                <input name="amount" type="number" step="0.01" min="1" required />
              </div>
              <div>
                <label>Reference number</label>
                <input name="reference" required />
              </div>
              <div style="grid-column: 1 / -1">
                <label>Proof image <span class="muted">(required for Live API)</span></label>
                <input name="proof" type="file" accept="image/*" />
              </div>
              <div style="grid-column: 1 / -1"><button class="btn ok" type="submit">Submit deposit</button></div>
            </form>
          </div>
          <div class="card">
            <h3 style="margin: 0 0 8px">Deposit History</h3>
            <table class="history">
              <thead>
                <tr>
                  <th>Date</th>
                  <th>Method</th>
                  <th>Amount</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody id="deposit-history"></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>
    <script src="./assets/app.js"></script>
    <script>
      DemoApp.initDepositPage();
    </script>
  </body>
</html>
