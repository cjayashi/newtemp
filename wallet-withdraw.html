<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Zignals Static Demo - Wallet Withdraw</title>
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <a class="brand" href="./index.html">Zignals<span>.org</span></a>
        <a class="nav-link" href="./index.html">Dashboard</a>
        <button id="toggle-managed" class="group-title">Managed Trade</button>
        <div id="managed-submenu" class="submenu"><div class="submenu-inner">
          <a class="nav-link" href="./managed-trade.html">Trading Program</a>
          <a class="nav-link" href="./managed-trade.html#history">Trading History</a>
        </div></div>
        <button id="toggle-wallet" class="group-title">Wallet</button>
        <div id="wallet-submenu" class="submenu open"><div class="submenu-inner">
          <a class="nav-link" href="./wallet-deposit.html">Deposit</a>
          <a class="nav-link active" href="./wallet-withdraw.html">Withdraw</a>
        </div></div>
      </aside>
      <main class="main">
        <header class="topbar">
          <span class="badge-live demo" data-api-badge style="margin-right: auto">Connecting…</span>
          <button class="icon-btn">🔔</button>
          <a class="icon-btn" href="#">👤</a>
        </header>
        <section class="content">
          <h1 class="h1">Withdraw</h1>
          <p class="sub">Separate withdrawal form + withdrawal history.</p>
          <div class="card">
            <div class="note">Available: <span data-available>-</span></div>
            <form id="withdraw-form" class="grid grid-2" style="margin-top:8px">
              <div>
                <label>Amount (USD)</label>
                <input name="amount" type="number" step="0.01" min="1" required />
              </div>
              <div>
                <label>Destination</label>
                <input name="destination" placeholder="Wallet address / payout rail" required />
              </div>
              <div style="grid-column: 1 / -1; display: flex; align-items: center; gap: 8px">
                <label style="margin: 0; display: flex; align-items: center; gap: 8px; cursor: pointer">
                  <input type="checkbox" name="confirm" /> I confirm payout details (required for Live API)
                </label>
              </div>
              <div style="grid-column:1/-1"><button class="btn ok" type="submit">Submit Withdrawal</button></div>
            </form>
          </div>
          <div class="card">
            <h3 style="margin:0 0 6px">Withdraw History</h3>
            <table class="history">
              <thead><tr><th>Date</th><th>Amount</th><th>Destination</th><th>Status</th></tr></thead>
              <tbody id="withdraw-history"></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>
    <script src="./assets/app.js"></script>
    <script>
      DemoApp.bindSidebar("wallet");
      DemoApp.initWithdrawPage();
    </script>
  </body>
  </html>
