<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Zignals — Withdraw</title>
    <link rel="stylesheet" href="./assets/styles.css" />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div class="layout">
      <aside id="sidebar-root" class="sidebar"></aside>
      <main class="main">
        <header class="topbar">
          <span class="badge-live standard" data-api-badge>Connecting…</span>
          <div class="topbar-fill" aria-hidden="true"></div>
          <div data-auth-slot></div>
          <button type="button" class="icon-btn">🔔</button>
        </header>
        <section class="content">
          <h1 class="h1">Withdraw</h1>
          <p class="sub">Available balance updates after requests; confirmations match live payout validation.</p>
          <div class="card interactive" data-tilt>
            <div class="note">Available: <span data-available>-</span></div>
            <form id="withdraw-form" class="grid grid-2" style="margin-top: 10px">
              <div>
                <label>Amount (USD)</label>
                <input name="amount" type="number" step="0.01" min="1" required />
              </div>
              <div>
                <label>Destination</label>
                <input name="destination" placeholder="Wallet address / payout rail" required />
              </div>
              <div style="grid-column: 1 / -1">
                <label style="cursor: pointer; display: flex; align-items: center; gap: 10px">
                  <input type="checkbox" name="confirm" /> I confirm payout details (Live API)
                </label>
              </div>
              <div style="grid-column: 1 / -1"><button class="btn ok" type="submit">Submit withdrawal</button></div>
            </form>
          </div>
          <div class="card">
            <h3 style="margin: 0 0 8px">Withdraw History</h3>
            <div class="table-scroll">
              <table class="history">
                <thead>
                  <tr>
                    <th>Date</th>
                    <th>Amount</th>
                    <th>Destination</th>
                    <th>Status</th>
                  </tr>
                </thead>
                <tbody id="withdraw-history"></tbody>
              </table>
            </div>
          </div>
        </section>
      </main>
    </div>
    <script src="./assets/app.js"></script>
    <script>
      DemoApp.initWithdrawPage();
    </script>
  </body>
</html>
