<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Zignals — Report an issue</title>
    <link rel="stylesheet" href="./assets/styles.css" />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div class="layout">
      <aside id="sidebar-root" class="sidebar"></aside>
      <main class="main">
        <header class="topbar">
          <span class="badge-live standard" data-api-badge>Connecting…</span>
          <div class="topbar-fill" aria-hidden="true"></div>
          <div data-auth-slot></div>
        </header>
        <section class="content">
          <h1 class="h1">Report an issue</h1>
          <p class="sub">Route this form to Slack, Zendesk, or email on the server. Here it confirms receipt instantly.</p>
          <div class="card interactive" data-tilt>
            <form id="issue-form" class="grid grid-2">
              <div>
                <label>Topic</label>
                <select name="topic">
                  <option>Deposit / treasury</option>
                  <option>Withdrawal payout</option>
                  <option>Trading program UI</option>
                  <option>Referral payouts</option>
                  <option>Market data</option>
                </select>
              </div>
              <div>
                <label>Urgency</label>
                <select name="urgency"><option>P2</option><option>P1</option><option>P0 — revenue impact</option></select>
              </div>
              <div style="grid-column: 1 / -1">
                <label>Describe the issue</label>
                <textarea name="detail" rows="5" placeholder="Steps, timestamps, wallets…" required></textarea>
              </div>
              <div style="grid-column: 1 / -1"><button type="submit" class="btn ok">Submit report</button></div>
            </form>
          </div>
        </section>
      </main>
    </div>
    <script src="./assets/app.js"></script>
    <script>
      DemoApp.initReportIssuePage();
    </script>
  </body>
</html>
