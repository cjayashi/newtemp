<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Zignals — Log in</title>
    <link rel="stylesheet" href="./assets/styles.css" />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body class="auth-page">
    <div class="auth-top">
      <a class="brand" href="./index.html">Zignals<span>.org</span></a>
      <div data-auth-slot></div>
    </div>
    <div class="auth-panel interactive-card" data-tilt>
      <h1 class="h1" style="font-size: 24px">Log in</h1>
      <p class="sub" style="margin-bottom: 18px">Demo only — creates a local session (no real auth).</p>
      <form id="login-form">
        <label>Email</label>
        <input name="email" type="email" autocomplete="username" required placeholder="you@example.com" />
        <label style="margin-top: 12px">Password</label>
        <input name="password" type="password" autocomplete="current-password" required placeholder="••••••••" />
        <div class="row" style="margin-top: 18px">
          <button type="submit" class="btn ok" style="flex: 1">Continue</button>
        </div>
        <p class="note" style="margin-top: 14px">New here? <a href="./register.html" style="color: var(--accent)">Create an account</a></p>
      </form>
    </div>
    <script src="./assets/app.js"></script>
    <script>
      DemoApp.initLoginPage();
    </script>
  </body>
</html>
